<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike-Vibe by Telkomsel | Brand Collaboration</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .paper-section {
            background: rgba(10, 0, 0, 0.4);
            border: 1px solid rgba(255, 10, 51, 0.3);
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(255, 10, 51, 0.05);
            animation: fadeIn 0.8s ease-out forwards;
        }

        .paper-section h2 {
            font-family: 'Teko', sans-serif;
            font-size: 2.2rem;
            color: #ff0a33;
            border-bottom: 2px solid rgba(255, 10, 51, 0.2);
            padding-bottom: 10px;
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .paper-section h3 {
            font-family: 'Teko', sans-serif;
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 10px;
        }

        .paper-section p {
            line-height: 1.8;
            margin-bottom: 20px;
            text-align: justify;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.05rem;
        }

        .paper-section ul {
            padding-left: 25px;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.8);
        }

        .paper-section li {
            line-height: 1.8;
            margin-bottom: 10px;
            font-size: 1.05rem;
        }

        .concept-frame {
            background: rgba(255, 10, 51, 0.02);
            padding: 20px;
            border-left: 4px solid #ff0a33;
            margin-bottom: 25px;
            border-radius: 0 8px 8px 0;
        }
    </style>
</head>

<body>
    <nav class="main-nav">
        <div class="nav-content">
            <div class="nav-logo">NIKE-VIBE</div>
            <div class="nav-links">
                <a href="index.html">Innovation Concept</a>
                <a href="brand_collaboration.html" class="active">Brand Collaboration</a>
                <a href="/dashboard/" class="dashboard-btn">Live Dashboard <span class="live-dot"></span></a>
            </div>
        </div>
    </nav>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <header>
            <div class="brand-badge">Mini Paper</div>
            <h1 id="main-title">Brand Collaboration</h1>
            <p class="subtitle" id="main-subtitle">Telkomsel x Nike Digital Recruitment System</p>
        </header>

        <section class="visuals-grid-brand"
            style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 40px; animation: fadeIn 1s ease-out;">
            <div class="visual-card"
                style="position: relative; overflow: hidden; border-radius: 12px; border: 1px solid rgba(255, 10, 51, 0.3); background: #000; cursor: pointer;">
                <img src="images/Brand_collab.png" alt="Brand Collaboration Concept"
                    style="width: 100%; height: 250px; object-fit: cover;">
                <div style="padding: 15px; background: rgba(0,0,0,0.8); border-top: 1px solid rgba(255,10,51,0.3);">
                    <h4 style="color: #ff0a33; margin: 0; font-family: 'Teko', sans-serif; font-size: 1.1rem;">
                        COLLABORATION ECOSYSTEM</h4>
                </div>
            </div>
            <div class="visual-card"
                style="position: relative; overflow: hidden; border-radius: 12px; border: 1px solid rgba(255, 10, 51, 0.3); background: #000; cursor: pointer;">
                <img src="images/Brand_Collab_2.png" alt="AI Strategy"
                    style="width: 100%; height: 250px; object-fit: cover;">
                <div style="padding: 15px; background: rgba(0,0,0,0.8); border-top: 1px solid rgba(255,10,51,0.3);">
                    <h4 style="color: #ff0a33; margin: 0; font-family: 'Teko', sans-serif; font-size: 1.1rem;">DIGITAL
                        RECRUITMENT STRATEGY</h4>
                </div>
            </div>
        </section>

        <div id="paper-grid" class="paper-grid"
            style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; margin-top: 40px;">
            <div style="text-align: center; padding: 50px; grid-column: 1/-1;">
                <div class="live-dot" style="display:inline-block; width:15px; height:15px;"></div> Fetching academic
                paper...
            </div>
        </div>

        <footer>
            <div class="footer-copyright">
                &copy; 2026 - Telkomsel x Nike Innovation Recruitment Dashboard.
            </div>
        </footer>
    </div>

    <!-- Modal for Detailed Content -->
    <div id="image-modal" class="modal">
        <span class="close-modal">&times;</span>
        <div class="modal-body">
            <img id="modal-img" class="modal-content" style="display:none;">
            <div id="modal-card-content" class="modal-card-body" style="display:none;"></div>
        </div>
        <div id="modal-caption" class="caption"></div>
    </div>

    <script>
        fetch('MiniPaper_BrandCollab.json')
            .then(response => response.json())
            .then(data => {
                const konten = data.konten;
                const grid = document.getElementById('paper-grid');
                const modal = document.getElementById('image-modal');
                const modalCardBody = document.getElementById('modal-card-content');
                const modalImg = document.getElementById('modal-img');
                const captionText = document.getElementById('modal-caption');
                const closeModal = document.querySelector('.close-modal');

                grid.innerHTML = ''; // Clear loading text

                const sections = [
                    { id: 'introduction', title: 'Introduction', icon: 'M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z' },
                    { id: 'conceptual_framework', title: 'Conceptual Framework', icon: 'M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z' },
                    { id: 'method', title: 'Method', icon: 'M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z' },
                    { id: 'results', title: 'Results', icon: 'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z' },
                    { id: 'implementation', title: 'Implementation', icon: 'M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z' },
                    { id: 'discussion', title: 'Discussion', icon: 'M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z' },
                    { id: 'conclusion', title: 'Conclusion', icon: 'M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z' },
                    { id: 'daftar_pustaka', title: 'Daftar Pustaka', icon: 'M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.168.477 4.253 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.168.477-4.253 1.253' }
                ];

                sections.forEach((sec, index) => {
                    const card = document.createElement('div');
                    card.className = 'paper-card';
                    card.style.cssText = `
                        background: rgba(255, 255, 255, 0.03);
                        border: 1px solid rgba(255, 10, 51, 0.1);
                        border-radius: 20px;
                        padding: 2rem;
                        cursor: pointer;
                        transition: all 0.3s ease;
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        text-align: center;
                        animation: fadeInUp 0.6s ease forwards ${index * 0.1}s;
                        opacity: 0;
                        transform: translateY(20px);
                    `;

                    // Hover effect
                    card.addEventListener('mouseenter', () => {
                        card.style.background = 'rgba(238, 20, 36, 0.05)';
                        card.style.borderColor = 'rgba(238, 20, 36, 0.4)';
                        card.style.transform = 'translateY(-10px)';
                        card.style.boxShadow = '0 10px 30px rgba(238, 20, 36, 0.1)';
                    });
                    card.addEventListener('mouseleave', () => {
                        card.style.background = 'rgba(255, 255, 255, 0.03)';
                        card.style.borderColor = 'rgba(255, 10, 51, 0.1)';
                        card.style.transform = 'translateY(0)';
                        card.style.boxShadow = 'none';
                    });

                    card.innerHTML = `
                        <div style="background: rgba(238, 20, 36, 0.1); width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-bottom: 20px;">
                            <svg style="width: 30px; height: 30px; color: #ff0a33;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${sec.icon}" />
                            </svg>
                        </div>
                        <h3 style="font-family: 'Teko', sans-serif; color: #fff; font-size: 1.8rem; margin: 0;">${sec.title}</h3>
                        <p style="color: rgba(255,255,255,0.5); font-size: 0.8rem; margin-top: 10px;">READ FULL ACADEMIC CONTENT</p>
                    `;

                    card.onclick = () => {
                        modal.style.display = "block";
                        modalImg.style.display = "none";
                        modalCardBody.style.display = "block";
                        captionText.innerHTML = sec.title;

                        let contentHTML = `<h4>${sec.title}</h4>`;

                        // Dynamically format content based on block
                        const dataBlock = konten[sec.id];
                        if (sec.id === 'conceptual_framework') {
                            contentHTML += dataBlock.deskripsi_umum.map(p => `<p>${p}</p>`).join('');
                            contentHTML += `
                            <div class="concept-frame" style="background: rgba(255, 10, 51, 0.05); padding: 20px; border-left: 4px solid #ff0a33; border-radius: 0 8px 8px 0; margin-top: 20px;">
                                <h5>Komponen Utama</h5>
                                <ul style="list-style: none; padding: 0;">
                                    <li style="margin-bottom: 10px;"><strong style="color: #ff0a33;">Input:</strong> ${dataBlock.komponen_utama.input}</li>
                                    <li style="margin-bottom: 10px;"><strong style="color: #ff0a33;">Process:</strong> ${dataBlock.komponen_utama.process}</li>
                                    <li><strong style="color: #ff0a33;">Output:</strong> ${dataBlock.komponen_utama.output}</li>
                                </ul>
                            </div>
                            <p style="margin-top:20px;">${dataBlock.kesimpulan_kerangka}</p>
                            <div style="margin-top:20px; border: 1px dashed rgba(255,255,255,0.2); padding: 15px; border-radius: 8px;">
                                <p><strong>${dataBlock.ilustrasi_konseptual_model_framework.deskripsi}</strong></p>
                                <p><span style="color: cyan;">Input:</span> ${dataBlock.ilustrasi_konseptual_model_framework.input.join(', ')}</p>
                                <p><span style="color: cyan;">Process:</span> ${dataBlock.ilustrasi_konseptual_model_framework.process.join(', ')}</p>
                                <p><span style="color: cyan;">Output:</span> ${dataBlock.ilustrasi_konseptual_model_framework.output.join(', ')}</p>
                            </div>`;
                        } else if (sec.id === 'results') {
                            contentHTML += dataBlock.deskripsi_awal.map(p => `<p>${p}</p>`).join('');
                            contentHTML += `<ul style="color: #fff; margin: 15px 0;">${dataBlock.aspek_rekrutmen.map(l => `<li style="margin-bottom: 5px;">${l}</li>`).join('')}</ul>`;
                            contentHTML += dataBlock.deskripsi_lanjutan.map(p => `<p>${p}</p>`).join('');
                        } else if (sec.id === 'daftar_pustaka') {
                            contentHTML += `<ul style="list-style-type: square; color: #fff;">${dataBlock.map(l => `<li style="margin-bottom: 10px; font-size: 1rem;">${l}</li>`).join('')}</ul>`;
                        } else {
                            // Default array of paragraphs
                            contentHTML += dataBlock.map(p => `<p>${p}</p>`).join('');
                        }

                        modalCardBody.innerHTML = contentHTML;
                    };

                    grid.appendChild(card);
                });

                // Add zoom to visuals grid images
                document.querySelectorAll('.visual-card').forEach(vCard => {
                    vCard.onclick = () => {
                        const img = vCard.querySelector('img');
                        const title = vCard.querySelector('h4').textContent;
                        modal.style.display = "block";
                        modalImg.style.display = "block";
                        modalImg.src = img.src;
                        modalCardBody.style.display = "none";
                        captionText.innerHTML = title;
                    };
                });

                closeModal.onclick = () => modal.style.display = "none";
                window.onclick = (e) => { if (e.target == modal) modal.style.display = "none"; };
            })
            .catch(error => {
                document.getElementById('paper-grid').innerHTML = `
                <div style="grid-column: 1/-1; border: 1px solid red; padding: 20px; text-align: center; border-radius: 8px;">
                    <h2 style="color: red;">Error</h2>
                    <p>Failed to load academic data. Check MiniPaper_BrandCollab.json.</p>
                </div>
                `;
            });

        // Add keyframe animation
        const styleSheet = document.createElement('style');
        styleSheet.innerHTML = `
            @keyframes fadeInUp {
                from { opacity: 0; transform: translateY(30px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .modal-card-body h5 { color: #ff0a33; font-size: 1.4rem; margin-bottom: 15px; font-family: 'Teko', sans-serif; }
            .modal-card-body p { margin-bottom: 15px; font-size: 1.1rem; text-align: justify; }
            #modal-card-content { max-height: 70vh; overflow-y: auto; padding-right: 15px; }
            #modal-card-content::-webkit-scrollbar { width: 6px; }
            #modal-card-content::-webkit-scrollbar-thumb { background: #ff0a33; border-radius: 10px; }
        `;
        document.head.appendChild(styleSheet);
    </script>
</body>

</html>
